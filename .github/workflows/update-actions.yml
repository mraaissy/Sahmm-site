name: Actualiser les fiches Actions (quotidien)

on:
  schedule:
    # Une fois par jour à 6h00 UTC (7h00 heure du Maroc)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Récupérer les fiches Actions (casabourse.ma)
        run: python scripts/update_actions.py

      - name: Committer et pousser si changement
        run: |
          git config user.name "sahm-bot"
          git config user.email "bot@sahmm.ma"
          git add public/data/actions.json
          git diff --staged --quiet || git commit -m "Actualisation quotidienne des fiches Actions"
          git push
